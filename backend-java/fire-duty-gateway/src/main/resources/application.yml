server:
  port: 8080
spring:
  application:
    name: fire-duty-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: device-service
          uri: http://localhost:8082
          predicates:
            - Path=/devices/**
        - id: task-service
          uri: http://localhost:8083
          predicates:
            - Path=/tasks/**
        - id: rectification-service
          uri: http://localhost:8084
          predicates:
            - Path=/rectifications/**
        - id: statistics-service
          uri: http://localhost:8085
          predicates:
            - Path=/statistics/**
        - id: user-service
          uri: http://localhost:8086
          predicates:
            - Path=/users/**
        - id: mobile-service
          uri: http://localhost:8087
          predicates:
            - Path=/mobile/**,/upload/**
        - id: grid-service
          uri: http://localhost:8088
          predicates:
            - Path=/grids/**
      default-filters:
        - name: JwtAuthGatewayFilter
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
  main:
    web-application-type: reactive
