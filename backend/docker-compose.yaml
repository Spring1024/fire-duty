version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fire-duty-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fire_duty
      POSTGRES_PASSWORD: fire_duty_pass
      POSTGRES_DB: fire_duty
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fire_duty -d fire_duty"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire-duty-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: fire_duty
      DB_PASS: fire_duty_pass
      DB_NAME: fire_duty
      JWT_SECRET: "change-me-in-production"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: fire-duty-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
